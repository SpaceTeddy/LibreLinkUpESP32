name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [esp32dev]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Install library dependencies
        run: |
          pio pkg install --global \
            --library "bblanchon/ArduinoJson@^6.21.5" \
            --library "https://github.com/nomis/mcu-uuid-log.git"

      - name: Build minimal example
        run: |
          platformio ci \
            --project-option "platform=espressif32" \
            --project-option "framework=arduino" \
            --board ${{ matrix.board }} \
            --lib . \
            examples/minimal_fetch/minimal_fetch.ino
